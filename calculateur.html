<!DOCTYPE html>
<html>
<head>
    <title>Calculateur achat-revente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffb6c1;
        }

        h1 {
            color: #333;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #resultat {
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Calculateur automobile</h1>

    <label>Prix d'achat (€) :</label>
    <input type="number" id="achat">

    <br><br>

    <label>Frais (€) :</label>
    <input type="number" id="frais">

    <br><br>

    <label>Prix de revente (€) :</label>
    <input type="number" id="revente">

    <br><br>

    <button onclick="calculer()">Calculer</button>

    <h2 id="resultat"></h2>

    <script>
        function calculer() {
            let achat = Number(document.getElementById("achat").value);
            let frais = Number(document.getElementById("frais").value);
            let revente = Number(document.getElementById("revente").value);

            if (!achat || !frais || !revente) {
                document.getElementById("resultat").textContent = "Remplis tous les champs.";
                return;
            }

            let benefice = revente - achat - frais;

            if (benefice > 0) {
                document.getElementById("resultat").textContent = "Bénéfice : +" + benefice + " €";
            } else {
                document.getElementById("resultat").textContent = "Perte : " + benefice + " €";
            }
        }
    </script>
</body>
</html>
