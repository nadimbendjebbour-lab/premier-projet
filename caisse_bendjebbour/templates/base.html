<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Caisse Bendjebbour{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary:   #1a5276;
      --primary-d: #154360;
    }
    body { background: #f0f4f8; font-family: "Segoe UI", system-ui, sans-serif; }

    .navbar { background: var(--primary) !important; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .navbar-brand { font-size: 1.3rem; font-weight: 700; letter-spacing: .5px; }
    .nav-link { color: rgba(255,255,255,.85) !important; }
    .nav-link:hover, .nav-link.active { color: #fff !important; }

    .card { border: none; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }

    .badge-paye    { background:#d4efdf; color:#1e8449; font-weight:600; padding:.35em .75em; border-radius:20px; }
    .badge-nonpaye { background:#fadbd8; color:#c0392b; font-weight:600; padding:.35em .75em; border-radius:20px; }

    /* Ligne chef de famille : légère teinte dorée */
    .chef-row { background: linear-gradient(90deg, #fef9ec 0%, #fdfefe 100%); }

    .stat-card { border-radius: 12px; padding: 1rem 1.25rem; color: #fff; }
    .stat-card .num { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-card .lbl { font-size: .8rem; opacity: .85; text-transform: uppercase; letter-spacing: .5px; }

    .table-members thead { background: var(--primary); color: #fff; }
    .table-members tbody tr:hover { background: #ebf5fb; }
    .table-members td, .table-members th { vertical-align: middle; }
    .table-members thead th.table-active { background: rgba(255,255,255,.2); }

    .btn-primary   { background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-d); border-color: var(--primary-d); }

    footer { font-size:.8rem; color:#7f8c8d; padding:1.5rem 0; text-align:center; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <i class="bi bi-cash-stack me-2"></i>Caisse Bendjebbour
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
             href="{{ url_for('index') }}"><i class="bi bi-house me-1"></i>Accueil</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'ajouter' %}active{% endif %}"
             href="{{ url_for('ajouter') }}"><i class="bi bi-person-plus me-1"></i>Ajouter</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-3">
  {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
</div>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer>&copy; 2024 Caisse Bendjebbour &mdash; Cahier de caisse familial</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
