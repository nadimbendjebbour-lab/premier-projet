{% extends "base.html" %}
{% block title %}Modifier {{ m.prenom }} {{ m.nom }} — Caisse Bendjebbour{% endblock %}

{% block content %}

<div class="mb-3">
  <a href="{{ url_for('membre', id=m.id) }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Retour à la fiche
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header py-3"
           style="background:var(--primary);color:#fff;border-radius:12px 12px 0 0">
        <h5 class="mb-0">
          <i class="bi bi-pencil me-2"></i>Modifier — {{ m.prenom }} {{ m.nom }}
        </h5>
      </div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('modifier', id=m.id) }}">

          <div class="mb-3">
            <label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
            <input type="text" name="nom" class="form-control"
                   value="{{ m.nom }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Prénom</label>
            <input type="text" name="prenom" class="form-control"
                   value="{{ m.prenom }}">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Type <span class="text-danger">*</span></label>
            <div class="row g-2">
              <div class="col-6">
                <input type="radio" class="btn-check" name="type"
                       id="type_famille" value="famille"
                       {% if m.type == 'famille' %}checked{% endif %} required>
                <label class="btn btn-outline-info w-100 py-3" for="type_famille">
                  <i class="bi bi-people-fill d-block fs-3 mb-1"></i>
                  Famille<br><small class="text-muted">60 € / an</small>
                </label>
              </div>
              <div class="col-6">
                <input type="radio" class="btn-check" name="type"
                       id="type_celibataire" value="celibataire"
                       {% if m.type == 'celibataire' %}checked{% endif %}>
                <label class="btn btn-outline-secondary w-100 py-3" for="type_celibataire">
                  <i class="bi bi-person-fill d-block fs-3 mb-1"></i>
                  Célibataire<br><small class="text-muted">30 € / an</small>
                </label>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Montant annuel (automatique)</label>
            <div class="input-group">
              <input type="text" id="montant_affiche" class="form-control"
                     value="{{ m.montant_du }} €" readonly>
              <span class="input-group-text"><i class="bi bi-currency-euro"></i></span>
            </div>
          </div>

          <div class="mb-3 form-check form-switch">
            <input type="checkbox" class="form-check-input"
                   name="est_chef_famille" id="est_chef"
                   {% if m.est_chef_famille %}checked{% endif %}>
            <label class="form-check-label" for="est_chef">
              <i class="bi bi-person-fill text-warning me-1"></i>Chef de famille
              <small class="text-muted d-block">Le père ou responsable de la famille.</small>
            </label>
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-save me-1"></i>Enregistrer les modifications
            </button>
            <a href="{{ url_for('membre', id=m.id) }}" class="btn btn-outline-secondary">
              Annuler
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  document.querySelectorAll('input[name="type"]').forEach(r =>
    r.addEventListener('change', () => {
      document.getElementById('montant_affiche').value =
        r.value === 'famille' ? '60 €' : '30 €';
    })
  );
</script>
{% endblock %}
